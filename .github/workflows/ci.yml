name: ci

# Self-test: render the legacy compatibility sample and branded research-paper
# specimen, validate PDF/UA structure/metadata/fonts/links, and compare the
# research paper against committed PNG goldens.
on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # EXACT typst pin — 0.15.0 postdates pandoc 3.10 (breaking changes); bump only
      # when a pandoc release states typst-0.15 compatibility, together with
      # bootstrap.sh and templates/*.yml.
      - uses: typst-community/setup-typst@v5
        with:
          typst-version: "0.14.2"
      - name: Install pandoc 3.10 (pinned)
        run: |
          curl -fsSL -o /tmp/pandoc.deb https://github.com/jgm/pandoc/releases/download/3.10/pandoc-3.10-1-amd64.deb
          echo "d502599878eb29af3ae5f0cb5d559134df96534125d452c7a0674a5bad2c5ecf  /tmp/pandoc.deb" | sha256sum -c -
          sudo dpkg -i /tmp/pandoc.deb
      # One script owns the entire structural and visual contract.
      - name: Self-test (fonts + PDFs + visual goldens)
        run: |
          pip install --quiet 'pypdf>=5,<7'
          TYPST=typst ./sample/selftest.sh
      - uses: actions/upload-artifact@v4
        with:
          name: sample-pdfs
          path: |
            sample/sample.pdf
            sample/research-paper.pdf
          if-no-files-found: error
