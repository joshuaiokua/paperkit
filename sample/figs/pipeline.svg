<svg xmlns="http://www.w3.org/2000/svg" width="660" height="150" viewBox="0 0 660 150">
  <!-- Hand-authored sample figure. Text is REAL text in DejaVu Sans — the same
       family matplotlib SVGs name — so check_render.py's sentinel + embedded-font
       assertions exercise the exact failure mode they guard in production. -->
