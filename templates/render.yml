name: render

# Renders every reports/*milestone*.md to PDF as a CI artifact on push. PDFs are
# never committed. Installed from paperkit (templates/render.yml) — the kit
# arrives at CI time as a pinned release-asset tarball; upgrade by bumping
# PAPERKIT_REF + PAPERKIT_SHA256 together (the sha is GitHub's published asset
# digest, printed by paperkit's release workflow). Release-on-tag lives in the
# sibling release.yml (a separate workflow because GitHub's `paths` filter
# interacts unreliably with tag pushes).

on:
  push:
    branches: ["**"]
    paths:
      - "reports/*milestone*.md"
      - "reports/figs/**"
      - ".github/workflows/render.yml"
  workflow_dispatch:

env:
  PAPERKIT_REF: v0.1.0
  PAPERKIT_SHA256: "950b15bbd0016449b96e6d3b1fde8ac8bb1c24ef528fc313cc789b70c1601837"

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # EXACT typst pin — 0.15.0 postdates pandoc 3.10 (breaking changes); bump only
      # when a pandoc release states typst-0.15 compatibility, together with paperkit.
      - uses: typst-community/setup-typst@v5
        with:
          typst-version: "0.14.2"
      - name: Install pandoc 3.10 (pinned)
        run: |
          curl -fsSL -o /tmp/pandoc.deb https://github.com/jgm/pandoc/releases/download/3.10/pandoc-3.10-1-amd64.deb
          echo "d502599878eb29af3ae5f0cb5d559134df96534125d452c7a0674a5bad2c5ecf  /tmp/pandoc.deb" | sha256sum -c -
          sudo dpkg -i /tmp/pandoc.deb
      - name: Fetch paperkit (pinned release asset)
        run: |
          curl -fsSL -o /tmp/paperkit.tar.gz \
            "https://github.com/joshuaiokua/paperkit/releases/download/${PAPERKIT_REF}/paperkit-${PAPERKIT_REF}.tar.gz"
          echo "${PAPERKIT_SHA256}  /tmp/paperkit.tar.gz" | sha256sum -c -
          tar -xzf /tmp/paperkit.tar.gz -C /tmp    # -> /tmp/paperkit/
      - name: Render milestone reports
        run: |
          pip install --quiet 'pypdf>=5,<7'
          mkdir -p pdf-out
          shopt -s nullglob
          for md in reports/*milestone*.md; do
            out="pdf-out/$(basename "${md%.md}").pdf"
            TYPST=typst /tmp/paperkit/render.sh "$md" "$out"
            python3 /tmp/paperkit/check_render.py "$out" --min-pages 2
          done
          ls -la pdf-out
      - uses: actions/upload-artifact@v4
        with:
          name: milestone-pdfs
          path: pdf-out/*.pdf
          if-no-files-found: error
